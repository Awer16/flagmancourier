version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: delivery_aggregator_db
    environment:
      POSTGRES_DB: delivery_aggregator
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: delivery_aggregator_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: delivery_aggregator_api
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres123@postgres:5432/delivery_aggregator
      DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres123@postgres:5432/delivery_aggregator
    volumes:
      - .:/app
    restart: unless-stopped

volumes:
  postgres_data:
